name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup .env.test file
        run: cp .env.example .env.test

      - name: Generate .env.test from secrets
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env.test
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env.test
          echo "RUN_SEED=true" >> .env.test
          echo "AUTH_GOOGLE_ID=${{ secrets.AUTH_GOOGLE_ID }}" >> .env.test
          echo "AUTH_GOOGLE_SECRET=${{ secrets.AUTH_GOOGLE_SECRET }}" >> .env.test
          echo "AUTH_GITHUB_ID=${{ secrets.AUTH_GITHUB_ID }}" >> .env.test
          echo "AUTH_GITHUB_SECRET=${{ secrets.AUTH_GITHUB_SECRET }}" >> .env.test
          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env.test
          echo "NEXT_PUBLIC_BASE_DEPLOY_URL=${{ secrets.NEXT_PUBLIC_BASE_DEPLOY_URL }}" >> .env.test
          echo "EMAIL_HOST=${{ secrets.EMAIL_HOST }}" >> .env.test
          echo "EMAIL_PORT=${{ secrets.EMAIL_PORT }}" >> .env.test
          echo "EMAIL_LOGIN=${{ secrets.EMAIL_LOGIN }}" >> .env.test
          echo "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" >> .env.test
          echo "WEB_HOST=web" >> .env.test
          echo "WEB_PORT=${{ secrets.WEB_PORT }}" >> .env.test
          echo "WS_TOKEN_SECRET=${{ secrets.WS_TOKEN_SECRET }}" >> .env.test

      - name: Create artifact directories
        run: |
          mkdir -p ./Power-Paint-E2E/playwright-report
          mkdir -p ./Power-Paint-E2E/test-results
          mkdir -p ./Power-Paint-E2E/screenshots

      - name: Run tests
        id: tests
        run: |
          docker compose -f ./docker-compose.e2e.yml --env-file ./.env.test run --name=e2e --rm --build e2e
        continue-on-error: true

      - name: Stop services
        run: docker compose -f ./docker-compose.e2e.yml down -v
        if: always()

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ./Power-Paint-E2E/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./Power-Paint-E2E/test-results/
          retention-days: 7

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: ./Power-Paint-E2E/screenshots/
          retention-days: 7

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
