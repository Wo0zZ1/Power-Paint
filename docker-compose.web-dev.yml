  socket:
    build:
      context: ./Power-Paint-Socket
      dockerfile: dockerfile
    environment:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_HOST: db
      POSTGRES_PORT: $POSTGRES_PORT
      POSTGRES_DB: $POSTGRES_DB
      POSTGRES_SCHEMA: $POSTGRES_SCHEMA
      POSTGRES_SSLMODE: $POSTGRES_SSLMODE
      DATABASE_SSL_REJECT_UNAUTHORIZED: $DATABASE_SSL_REJECT_UNAUTHORIZED
      WS_TOKEN_SECRET: $WS_TOKEN_SECRET
      HOCUSPOCUS_DOCUMENTS_TABLE: $HOCUSPOCUS_DOCUMENTS_TABLE
      PORT: $SOCKET_PORT
    networks:
      - power-paint-network
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    ports:
      - "$SOCKET_PORT:$SOCKET_PORT"

  nginx:
    image: nginx:alpine
    container_name: power-paint-nginx
    environment:
      WEB_HOST: $WEB_HOST
      WEB_PORT: $WEB_PORT
      SOCKET_HOST: $SOCKET_HOST
      SOCKET_PORT: $SOCKET_PORT
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates/power-paint.conf.template:/etc/nginx/templates/default.conf.template:ro
    networks:
      - power-paint-network
    depends_on:
      # - web
      - socket

volumes:
  pgdata:

networks:
  power-paint-network:
    driver: bridge
