services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_PORT: $POSTGRES_PORT
      POSTGRES_DB: $POSTGRES_DB
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - power-paint-network

  migrator:
    build:
      context: ./Power-Paint-Migrator
      dockerfile: dockerfile
      args:
        DATABASE_URL: $DATABASE_URL
    environment:
      DATABASE_URL: $DATABASE_URL
      RUN_SEED: $RUN_SEED
    networks:
      - power-paint-network
    depends_on:
      db:
        condition: service_healthy

  web:
    deploy:
      resources:
        limits:
          memory: 0.25G
    build:
      context: ./Power-Paint-Web
      dockerfile: dockerfile
      args:
        NEXT_PUBLIC_BASE_URL: $NEXT_PUBLIC_BASE_URL
        NEXT_PUBLIC_BASE_DEPLOY_URL: $NEXT_PUBLIC_BASE_DEPLOY_URL
        NEXT_PUBLIC_WS_URL: $NEXT_PUBLIC_WS_URL
        DATABASE_URL: $DATABASE_URL
    environment:
      NEXT_PUBLIC_BASE_URL: $NEXT_PUBLIC_BASE_URL
      NEXT_PUBLIC_BASE_DEPLOY_URL: $NEXT_PUBLIC_BASE_DEPLOY_URL
      NEXT_PUBLIC_WS_URL: $NEXT_PUBLIC_WS_URL
      DATABASE_URL: $DATABASE_URL

      WS_TOKEN_SECRET: $WS_TOKEN_SECRET
      AUTH_GOOGLE_ID: $AUTH_GOOGLE_ID
      AUTH_GOOGLE_SECRET: $AUTH_GOOGLE_SECRET
      AUTH_GITHUB_ID: $AUTH_GITHUB_ID
      AUTH_GITHUB_SECRET: $AUTH_GITHUB_SECRET
      AUTH_SECRET: $AUTH_SECRET
      AUTH_URL: $NEXT_PUBLIC_BASE_URL
      EMAIL_HOST: $EMAIL_HOST
      EMAIL_PORT: $EMAIL_PORT
      EMAIL_LOGIN: $EMAIL_LOGIN
      EMAIL_PASSWORD: $EMAIL_PASSWORD
      REACT_QUERY_DEVTOOLS_ENABLED: $REACT_QUERY_DEVTOOLS_ENABLED
      NODE_OPTIONS: $NODE_OPTIONS
      PORT: $WEB_PORT
    networks:
      - power-paint-network
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  socket:
    build:
      context: ./Power-Paint-Socket
      dockerfile: dockerfile
    environment:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_HOST: db
      POSTGRES_PORT: $POSTGRES_PORT
      POSTGRES_DB: $POSTGRES_DB
      POSTGRES_SCHEMA: $POSTGRES_SCHEMA
      POSTGRES_SSLMODE: $POSTGRES_SSLMODE
      DATABASE_SSL_REJECT_UNAUTHORIZED: $DATABASE_SSL_REJECT_UNAUTHORIZED
      WS_TOKEN_SECRET: $WS_TOKEN_SECRET
      HOCUSPOCUS_DOCUMENTS_TABLE: $HOCUSPOCUS_DOCUMENTS_TABLE
      PORT: $SOCKET_PORT
    networks:
      - power-paint-network
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  nginx:
    image: nginx:alpine
    container_name: power-paint-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # - ./certbot/www:/var/www/certbot:ro
      # - ./certbot/conf:/etc/nginx/ssl:ro
    networks:
      - power-paint-network
    depends_on:
      - web
      - socket
volumes:
  pgdata:

networks:
  power-paint-network:
    driver: bridge
