services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DB: $POSTGRES_DB
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - power-paint-network

  migrator:
    build:
      context: ./Power-Paint-Migrator
      dockerfile: dockerfile
      args:
        - DATABASE_URL=$DATABASE_URL
    environment:
      - DATABASE_URL=$DATABASE_URL
      - RUN_SEED=$RUN_SEED
    networks:
      - power-paint-network
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./Power-Paint-Web
      dockerfile: dockerfile
      args:
        - NEXT_PUBLIC_BASE_URL=$NEXT_PUBLIC_BASE_URL
        - NEXT_PUBLIC_BASE_DEPLOY_URL=$NEXT_PUBLIC_BASE_DEPLOY_URL
        - NEXT_PUBLIC_WS_URL=$NEXT_PUBLIC_WS_URL
        - DATABASE_URL=$DATABASE_URL
    environment:
      - NEXT_PUBLIC_BASE_URL=$NEXT_PUBLIC_BASE_URL
      - NEXT_PUBLIC_BASE_DEPLOY_URL=$NEXT_PUBLIC_BASE_DEPLOY_URL
      - NEXT_PUBLIC_WS_URL=$NEXT_PUBLIC_WS_URL
      - DATABASE_URL=$DATABASE_URL

      - WS_TOKEN_SECRET=$WS_TOKEN_SECRET
      - AUTH_GOOGLE_ID=$AUTH_GOOGLE_ID
      - AUTH_GOOGLE_SECRET=$AUTH_GOOGLE_SECRET
      - AUTH_GITHUB_ID=$AUTH_GITHUB_ID
      - AUTH_GITHUB_SECRET=$AUTH_GITHUB_SECRET
      - AUTH_SECRET=$AUTH_SECRET
      - AUTH_URL=$NEXT_PUBLIC_BASE_URL
      - EMAIL_HOST=$EMAIL_HOST
      - EMAIL_PORT=$EMAIL_PORT
      - EMAIL_LOGIN=$EMAIL_LOGIN
      - EMAIL_PASSWORD=$EMAIL_PASSWORD
      - REACT_QUERY_DEVTOOLS_ENABLED=$REACT_QUERY_DEVTOOLS_ENABLED
      - NODE_ENV=$NODE_ENV
      - NODE_OPTIONS=$NODE_OPTIONS
    ports:
      - "3000:3000"
    networks:
      - power-paint-network
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  socket:
    build:
      context: ./Power-Paint-Socket
      dockerfile: dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=$DATABASE_URL
      - PORT=$PORT
      - DATABASE_SSL=$DATABASE_SSL
      - WS_TOKEN_SECRET=$WS_TOKEN_SECRET
      - HOCUSPOCUS_DOCUMENTS_TABLE=$HOCUSPOCUS_DOCUMENTS_TABLE
      - PGSSLMODE=$PGSSLMODE
      - DATABASE_SSL_REJECT_UNAUTHORIZED=$DATABASE_SSL_REJECT_UNAUTHORIZED
    networks:
      - power-paint-network
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

volumes:
  pgdata:

networks:
  power-paint-network:
    driver: bridge
